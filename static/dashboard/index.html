<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Assist Dashboard</title>
  <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0/bundles/datastar.js"></script>
</head>
<body data-init="@get('/dashboard_setup')">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-left">
        <a href="/" class="brand-link">
          <div class="brand-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <span class="brand-text">College Assist</span>
        </a>
        <nav class="main-nav">
          <a href="/dashboard" class="active">Dashboard</a>
          <a href="/courses">Courses</a>
        </nav>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </button>
      </div>
    </header>
    <main class="main-content">
        <div class="page-title-group">
        </div> 
        <div class="page-actions">
        </div>
        <div class="stats-grid" >
        </div>
        <!this is the template for Milestone>
        <div class="card stat-card">
        </div>
    </main>
  </div>
</body>
</html>
